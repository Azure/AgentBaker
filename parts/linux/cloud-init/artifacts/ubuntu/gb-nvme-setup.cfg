# cloud-init config for GB200/GB300 NVMe RAID 0 setup.
# bootcmd runs every boot before other modules, ensuring /dev/md0 exists
# before fs_setup and mounts run.
bootcmd:
  - |
    if [ ! -e /dev/md0 ]; then
      mdadm --create /dev/md0 --level=0 --raid-devices=4 --force \
        /dev/disk/azure/local/by-index/1 \
        /dev/disk/azure/local/by-index/2 \
        /dev/disk/azure/local/by-index/3 \
        /dev/disk/azure/local/by-index/4
    fi

fs_setup:
  - label: intelnvme
    filesystem: ext4
    device: /dev/md0
    overwrite: false

mounts:
  - ["/dev/md0", "/mnt/aks", "ext4", "discard,barrier=0,nofail", "0", "2"]
