# This runs at cloud_config_modules stage (once-per-instance by default).
# Note: overwrite: false prevents reformatting if the filesystem already exists.
disk_setup:
  /dev/md0:
    table_type: raid
    layout: raid0
    devices:
      - /dev/disk/azure/local/by-index/1
      - /dev/disk/azure/local/by-index/2
      - /dev/disk/azure/local/by-index/3
      - /dev/disk/azure/local/by-index/4

fs_setup:
  - label: intelnvme
    filesystem: ext4
    device: /dev/md0
    overwrite: false

mounts:
  - ["/dev/md0", "/mnt/aks", "ext4", "discard,barrier=0,nofail", "0", "2"]

runcmd:
  - mkdir -p /var/lib/kubelet
  - mount --bind /mnt/aks /var/lib/kubelet
  - grep -q '/var/lib/kubelet' /etc/fstab || echo "/mnt/aks /var/lib/kubelet none bind,nofail 0 0" >> /etc/fstab
