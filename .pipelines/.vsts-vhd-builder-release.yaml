    displayName: Build Azure Container Linux TL Gen2
    type: boolean
    default: true
  - name: buildaclarm64tlgen2
    displayName: Build Azure Container Linux ARM64 TL Gen2
    type: boolean
    default: true
  - name: buildaclfipstlgen2
    displayName: Build Azure Container Linux FIPS TL Gen2
    type: boolean
    default: true
  - name: buildaclarm64fipstlgen2
    displayName: Build Azure Container Linux ARM64 FIPS TL Gen2
    type: boolean
    default: true
  - name: aclSigSourceGallery
    displayName: ACL SIG source gallery unique name
    type: string
    default: '035db282-f1c8-4ce7-b78f-2a7265d5398c-ACLDEVEL'
  - name: aclSigSourceImageName
    displayName: ACL SIG source image definition (amd64)
    type: string
    default: 'acl-grub'
  - name: aclSigSourceArm64ImageName
    displayName: ACL SIG source image definition (arm64)
    type: string
    default: 'acl-grub-arm64'
  - name: aclImageVersion
    displayName: ACL SIG source image version (e.g., 0.20260523.1124361)
    type: string
    default: '0.20260523.1124361'
  - name: aclArm64ImageVersion
    displayName: ACL ARM64 SIG source image version (leave empty to use aclImageVersion)
    type: string
    default: ''
  - name: aclGpuSysextAcrRepo
    displayName: ACR repo for ACL GPU sysexts (e.g., acldevel.azurecr.io/azurelinux/3.0/azure-container-linux)
    type: string
    default: ''
  - name: aclGpuSysextTag
    displayName: ACL GPU sysext tag (e.g., 3.0.20260618.1234567; leave empty to skip GPU pre-cache)
    type: string
    default: ''

variables:
  - name: MODE
    value: "linuxVhdMode"
  - group: aks-vuln-to-kusto
  - group: "AKS Node SIG UA Token (KV)"
  - group: build_performance
  - group: aks-vuln-to-kusto-tme

stages:
  - stage: build
    jobs:
      - job: buildAzureLinuxV3gen1
        condition: eq('${{ parameters.buildAzureLinuxV3gen1 }}', true)
        dependsOn: [ ]
        timeoutInMinutes: 360
        steps:
          - bash: |
              echo '##vso[task.setvariable variable=OS_SKU]AzureLinux'
              echo '##vso[task.setvariable variable=OS_VERSION]V3'
              echo '##vso[task.setvariable variable=IMG_PUBLISHER]MicrosoftCBLMariner'
              echo '##vso[task.setvariable variable=IMG_OFFER]azure-linux-3'
              echo '##vso[task.setvariable variable=IMG_SKU]azure-linux-3'
              echo '##vso[task.setvariable variable=IMG_VERSION]latest'
              echo '##vso[task.setvariable variable=HYPERV_GENERATION]V1'
              echo '##vso[task.setvariable variable=AZURE_VM_SIZE]Standard_D16ds_v5'
              echo '##vso[task.setvariable variable=FEATURE_FLAGS]None'
              echo '##vso[task.setvariable variable=ARCHITECTURE]X86_64'
              echo '##vso[task.setvariable variable=ENABLE_FIPS]false'
              echo '##vso[task.setvariable variable=ENABLE_TRUSTED_LAUNCH]False'
              echo '##vso[task.setvariable variable=ENABLE_CGROUPV2]True'
            displayName: Setup Build Variables
          - template: ./templates/.builder-release-template.yaml
            parameters:
              artifactName: azurelinuxv3-gen1
