parameters:
- name: windowsversion
  displayName: Windows Version
  type: string
  default: "all"
  values:
  - "all"
  - "prod"
- name: registry
  displayName: Container Registry
  type: string
  default: "containerrollingregistry"
steps:
  - task: AzureCLI@2
    inputs:
      azureSubscription: 'AgentbakerPool'
      scriptType: 'bash'
      scriptLocation: 'inlineScript'
      inlineScript: |
        az account set -s $(AZURE_BUILD_SUBSCRIPTION_ID)

        azureRegistry="${{parameters.registry}}.azurecr.io"
        az acr login --name $azureRegistry

        cd $(System.DefaultWorkingDirectory)/.pipelines/tests
        chmod a+x ./crossbuild.sh

        docker version
        
        # Registry path for active branch testing is a little different than the others
        # So we differentiate active branch from others here
        if [ "${{ parameters.windowsversion }}" == "all" ]; then
          echo "Cross build test for active branch"
          bash ./crossbuild.sh activebranch ${azureRegistry}
          
          echo "Cross build test for windows from prod"
          bash ./crossbuild.sh prod ${azureRegistry}
        else
          echo "Cross build test for windows from prod"
          bash ./crossbuild.sh prod ${azureRegistry}
        fi
    displayName: 'Cross build test'