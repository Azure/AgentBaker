parameters:
  - name: name
    type: string
    displayName: Additional name for the pipeline step
    default: ""
  - name: IgnoreScenariosWithMissingVhd
    type: boolean
    displayName: Ignore tests where the VHD can't be loaded
  - name: variableGroup
    type: string
    displayName: Variable group to use for e2e tests
    default: ab-e2e
  - name: RunABUpdateTests
    type: boolean
    displayName: Run A/B update tests for ACL images
    default: false
  - name: CosiUrl
    type: string
    displayName: COSI image URL for A/B update tests (https:// blob storage URL)
    default: ""
  - name: dependsOn
    type: object
    displayName: Jobs this e2e job depends on
    default: []

jobs:
  - job: e2e
    condition: and(succeeded(), ne(variables.SKIP_E2E_TESTS, 'true'))
    dependsOn: ${{parameters.dependsOn}}
    variables:
      - group: ${{parameters.variableGroup}} # all variables prefixed with E2E_* come from this variable group
      - name: RESOLVED_COSI_URL
        ${{ if ne(parameters.CosiUrl, '') }}:
          value: ${{parameters.CosiUrl}}
        ${{ else }}:
          value: $[ dependencies.resolve_cosi_url.outputs['cosi.COSI_URL'] ]
    pool:
      name: $(E2E_POOL_NAME)
    timeoutInMinutes: 90
    displayName: Run AgentBaker E2E ${{parameters.name}}
    steps:
      - checkout: self
        # s is the default path for repositories - if we don't set this when using multiple repsositories, then it is the repo name
        # "s/AgentBaker", but most of the pipeline variables still refer to "s" and many of the scripts below fail.
        path: s
        fetchTags: false
        fetchDepth: 1

      - task: AzureCLI@2
        inputs:
          azureSubscription: $(E2E_ARM_SERVICE_CONNECTION)
          scriptType: bash
          scriptLocation: inlineScript
          inlineScript: |
            bash .pipelines/scripts/e2e_run.sh
        displayName: Run AgentBaker E2E
        env:
          E2E_SUBSCRIPTION_ID: $(E2E_SUBSCRIPTION_ID)
          SYS_SSH_PUBLIC_KEY: $(SYS_SSH_PUBLIC_KEY)
          SYS_SSH_PRIVATE_KEY_B64: $(SYS_SSH_PRIVATE_KEY_B64)
          BUILD_SRC_DIR: $(System.DefaultWorkingDirectory)
          DefaultWorkingDirectory: $(Build.SourcesDirectory)
          VHD_BUILD_ID: $(VHD_BUILD_ID)
          IGNORE_SCENARIOS_WITH_MISSING_VHD: ${{parameters.IgnoreScenariosWithMissingVhd}}
          RUN_AB_UPDATE_TESTS: ${{parameters.RunABUpdateTests}}
          COSI_URL: $(RESOLVED_COSI_URL)

      - task: PublishTestResults@2
        displayName: Upload test results
        condition: succeededOrFailed()
        inputs:
          testRunner: JUnit
          testResultsFiles: "$(Build.SourcesDirectory)/e2e/report.xml"

      - publish: $(System.DefaultWorkingDirectory)/e2e/$(LOGGING_DIR)
        artifact: $(LOGGING_DIR)
        condition: always()
        continueOnError: true

      - task: AzureCLI@2
        inputs:
          azureSubscription: $(E2E_ARM_SERVICE_CONNECTION)
          scriptType: bash
          scriptLocation: inlineScript
          inlineScript: |
            bash .pipelines/scripts/e2e_delete_vmss.sh
        displayName: ensure vmss deletion
        condition: always()
