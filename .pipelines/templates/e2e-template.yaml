parameters:
  - name: name
    type: string
    displayName: Additional name for the pipeline step
    default: ""
  - name: IgnoreScenariosWithMissingVhd
    type: boolean
    displayName: Ignore tests where the VHD can't be loaded
  - name: variableGroup
    type: string
    displayName: Variable group to use for e2e tests
    default: ab-e2e
  - name: cosiArtifactNames
    type: object
    displayName: List of COSI publishing info pipeline artifact names to download. Leave empty to skip COSI validation.
    default: []

jobs:
  - job: e2e
    condition: and(succeeded(), ne(variables.SKIP_E2E_TESTS, 'true'))
    variables:
      - group: ${{parameters.variableGroup}} # all variables prefixed with E2E_* come from this variable group
    pool:
      name: $(E2E_POOL_NAME)
    timeoutInMinutes: 90
    displayName: Run AgentBaker E2E ${{parameters.name}}
    steps:
      - checkout: self
        # s is the default path for repositories - if we don't set this when using multiple repsositories, then it is the repo name
        # "s/AgentBaker", but most of the pipeline variables still refer to "s" and many of the scripts below fail.
        path: s
        fetchTags: false
        fetchDepth: 1

      - ${{ each artifactName in parameters.cosiArtifactNames }}:
        - task: DownloadPipelineArtifact@2
          displayName: 'Download COSI info: ${{ artifactName }}'
          inputs:
            artifact: '${{ artifactName }}'
            path: '$(Pipeline.Workspace)/cosi-info/${{ artifactName }}'

      - ${{ if gt(length(parameters.cosiArtifactNames), 0) }}:
        - bash: |
            set -euo pipefail
            COSI_URLS=""
            for dir in $(Pipeline.Workspace)/cosi-info/*/; do
              info_file="${dir}cosi-publishing-info.json"
              artifact_name=$(basename "$dir")
              if [ ! -f "$info_file" ]; then
                echo "##vso[task.logissue type=error]Expected COSI publishing info at $info_file but file was not found"
                exit 1
              fi
              url=$(jq -er '.cosi_url // empty' "$info_file")
              if [ -z "$url" ]; then
                echo "##vso[task.logissue type=error]cosi_url is missing or empty in $info_file"
                exit 1
              fi
              echo "Found COSI URL for $artifact_name (redacted from logs)"
              if [ -n "$COSI_URLS" ]; then
                COSI_URLS="${COSI_URLS}|${url}"
              else
                COSI_URLS="$url"
              fi
            done
            echo "##vso[task.setvariable variable=COSI_URLS;issecret=true]$COSI_URLS"
            echo "Extracted $(echo "$COSI_URLS" | tr '|' '\n' | wc -l) COSI URL(s)"
          displayName: Extract COSI URLs

      - task: AzureCLI@2
        inputs:
          azureSubscription: $(E2E_ARM_SERVICE_CONNECTION)
          scriptType: bash
          scriptLocation: inlineScript
          inlineScript: |
            bash .pipelines/scripts/e2e_run.sh
        displayName: Run AgentBaker E2E
        env:
          E2E_SUBSCRIPTION_ID: $(E2E_SUBSCRIPTION_ID)
          SYS_SSH_PUBLIC_KEY: $(SYS_SSH_PUBLIC_KEY)
          SYS_SSH_PRIVATE_KEY_B64: $(SYS_SSH_PRIVATE_KEY_B64)
          BUILD_SRC_DIR: $(System.DefaultWorkingDirectory)
          DefaultWorkingDirectory: $(Build.SourcesDirectory)
          VHD_BUILD_ID: $(VHD_BUILD_ID)
          IGNORE_SCENARIOS_WITH_MISSING_VHD: ${{parameters.IgnoreScenariosWithMissingVhd}}
          COSI_URLS: $(COSI_URLS)

      - task: PublishTestResults@2
        displayName: Upload test results
        condition: succeededOrFailed()
        inputs:
          testRunner: JUnit
          testResultsFiles: "$(Build.SourcesDirectory)/e2e/report.xml"

      - publish: $(System.DefaultWorkingDirectory)/e2e/$(LOGGING_DIR)
        artifact: $(LOGGING_DIR)
        condition: always()
        continueOnError: true

      - task: AzureCLI@2
        inputs:
          azureSubscription: $(E2E_ARM_SERVICE_CONNECTION)
          scriptType: bash
          scriptLocation: inlineScript
          inlineScript: |
            bash .pipelines/scripts/e2e_delete_vmss.sh
        displayName: ensure vmss deletion
        condition: always()
