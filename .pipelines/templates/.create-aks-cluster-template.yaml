parameters:
- name: imageName
  displayName: Gallery Image Name
  type: string
  default: windows-2022-containerd-gen2
- name: imageVersion
  displayName: Gallery Image Version
  type: string
  default: latest
- name: networkPolicy
  displayName: Network Policy applied to the AKS cluster
  type: string
  default: default
- name: kubernetesVersion
  type: string
  displayName: kubernetes version to use for the tests

jobs:
  - job: create
    timeoutInMinutes: 60
    pool:
      name:  $(POOL_NAME)
    variables:
      SIG_IMAGE_NAME: ${{ parameters.imageName }}
      SIG_IMAGE_VERSION: ${{ parameters.imageVersion }}
      NETWORK_POLICY: ${{ parameters.networkPolicy }}
      K8s_VERSION: ${{ parameters.kubernetesVersion }}
    steps:
      - task: AzureCLI@2
        inputs:
          azureSubscription: 'AgentbakerPool'
          scriptType: 'bash'
          scriptLocation: 'inlineScript'
          inlineScript: |
            if [[ "$(SIG_IMAGE_VERSION)" == "latest" || "$(SIG_IMAGE_VERSION)" == "" ]]; then
              latest_image_version=$(az sig image-version list --gallery-image-definition $(SIG_IMAGE_NAME) \
                  --gallery-name $(SIG_GALLERY_NAME) \
                  --resource-group $(AZURE_BUILD_RESOURCE_GROUP_NAME) \
                  | jq -r 'sort_by(.tags.now) | .[-1].name')
            else
              latest_image_version=$(SIG_IMAGE_VERSION)
            fi

            latest_image=$(az sig image-version show --gallery-image-definition $(SIG_IMAGE_NAME) \
                --gallery-name $(SIG_GALLERY_NAME) \
                --resource-group $(AZURE_BUILD_RESOURCE_GROUP_NAME) \
                --gallery-image-version ${latest_image_version})

            if [[ -z "$latest_image" ]]; then
              echo "Image version ${latest_image_version} does not exist in gallery $(SIG_GALLERY_NAME)"
              exit 1
            fi

            echo "Using image name  $(SIG_IMAGE_NAME)"
            echo "Using image version ${latest_image_version}"

            CLUSTER_RG="$(SIG_IMAGE_NAME)-$latest_image_version"
            if [ "default" != "${NETWORK_POLICY}" ]; then
              CLUSTER_RG="${CLUSTER_RG}-${NETWORK_POLICY}"
            fi
            # if [[ "${{ parameters.imageName }}" == *"gen2"* ]]; then
            #   CLUSTER_RG="${CLUSTER_RG}-gen2"
            # fi

            BUID_IMAGE_VERSION=$latest_image_version
            echo "##vso[task.setvariable variable=BUID_IMAGE_VERSION;isOutput=true]${BUID_IMAGE_VERSION}"
            echo "##vso[task.setvariable variable=CLUSTER_RG;isOutput=true]${CLUSTER_RG}"
            echo "Resource Group is ${CLUSTER_RG}"
            echo "Build image version is ${BUID_IMAGE_VERSION}"
        name: setvar
        displayName: Setup Build Variables
      - task: AzureCLI@2
        inputs:
          azureSubscription: 'AgentbakerPool'
          scriptType: 'bash'
          scriptLocation: 'inlineScript'
          inlineScript: |
            set -euo pipefail

            FALLBACK_REGIONS=("$(AZURE_BUILD_LOCATION)" "eastus2" "westus2" "westus3" "centralus" "southcentralus")
            FALLBACK_VM_SIZES=("standard_d4s_v3" "standard_d4ds_v5" "standard_d4as_v5" "standard_d4s_v5" "standard_d4_v5")
            BASE_RG="$(setvar.CLUSTER_RG)"
            CLUSTER_NAME="testcluster"
            MAX_ATTEMPTS=10

            create_cluster_in_region() {
              local location="$1"
              local vm_size="$2"
              local rg="$3"

              # Ensure resource group exists in this region
              group_exists=$(az group exists -n "$rg")
              if [[ "$group_exists" != "true" ]]; then
                creation_time=$(date +"%Y-%m-%dT%H:%M:%S+00:00")
                az group create -n "$rg" -l "$location" --tags "createdtime=$creation_time" -o none
                echo "Created resource group $rg in $location"
              fi

              # Check if cluster already exists and is healthy
              provisioning_state=$(az aks show -n "$CLUSTER_NAME" -g "$rg" --query provisioningState -o tsv 2>/dev/null || echo "NotFound")
              if [[ "$provisioning_state" == "Succeeded" ]]; then
                echo "AKS cluster already exists with provisioning state: $provisioning_state"
                echo "##vso[task.setvariable variable=NO_CREATE;isOutput=true]true"
                echo "##vso[task.setvariable variable=CLUSTER_RG;isOutput=true]${rg}"
                return 0
              fi

              echo "##vso[task.setvariable variable=NO_CREATE;isOutput=true]false"

              # Create the cluster
              if [ "default" != "${NETWORK_POLICY}" ]; then
                echo "Creating AKS cluster in $location with VM size $vm_size and network policy ${NETWORK_POLICY}"
                az aks create \
                --resource-group "$rg" \
                --name "$CLUSTER_NAME" \
                --node-vm-size "$vm_size" \
                --enable-addons monitoring \
                --network-plugin azure \
                --network-policy ${NETWORK_POLICY} \
                --vm-set-type VirtualMachineScaleSets \
                --load-balancer-sku standard \
                --enable-managed-identity \
                --assign-identity  $(AZURE_MSI_RESOURCE_STRING) \
                --assign-kubelet-identity $(AZURE_MSI_RESOURCE_STRING) \
                --generate-ssh-keys \
                --kubernetes-version $(K8s_VERSION) \
                --location "$location"
              else
                echo "Creating AKS cluster in $location with VM size $vm_size (default network policy)"
                az aks create \
                --resource-group "$rg" \
                --name "$CLUSTER_NAME" \
                --node-vm-size "$vm_size" \
                --enable-addons monitoring \
                --network-plugin azure \
                --vm-set-type VirtualMachineScaleSets \
                --load-balancer-sku standard \
                --enable-managed-identity \
                --assign-identity  $(AZURE_MSI_RESOURCE_STRING) \
                --assign-kubelet-identity $(AZURE_MSI_RESOURCE_STRING) \
                --generate-ssh-keys \
                --kubernetes-version $(K8s_VERSION) \
                --location "$location"
              fi
            }

            # Main retry loop with region and VM size fallback
            region_idx=0
            vm_size_idx=0
            attempt=0

            while [[ $attempt -lt $MAX_ATTEMPTS ]]; do
              location="${FALLBACK_REGIONS[$region_idx]}"
              vm_size="${FALLBACK_VM_SIZES[$vm_size_idx]}"

              # Use a region-suffixed RG name for fallback regions
              if [[ $region_idx -eq 0 ]]; then
                rg="$BASE_RG"
              else
                rg="${BASE_RG}-${location}"
              fi

              echo "Attempt $((attempt+1)): region=$location, vm_size=$vm_size, rg=$rg"

              set +e
              output=$(create_cluster_in_region "$location" "$vm_size" "$rg" 2>&1)
              exit_code=$?
              set -e

              echo "$output"

              if [[ $exit_code -eq 0 ]]; then
                echo "##vso[task.setvariable variable=CLUSTER_RG;isOutput=true]${rg}"
                echo "Cluster created successfully in $location with VM size $vm_size"
                exit 0
              fi

              # Check error type and decide fallback strategy
              if echo "$output" | grep -qi "AKSCapacityHeavyUsage\|OverconstrainedAllocationRequest\|AllocationFailed"; then
                echo "Capacity error in $location. Trying next region..."
                region_idx=$((region_idx + 1))
                vm_size_idx=0  # reset VM size for new region
                if [[ $region_idx -ge ${#FALLBACK_REGIONS[@]} ]]; then
                  echo "All fallback regions exhausted."
                  exit 1
                fi
              elif echo "$output" | grep -qi "vm size.*is not allowed\|VMSizeNotSupported\|The VM size"; then
                echo "VM size $vm_size not available in $location. Trying next VM size..."
                vm_size_idx=$((vm_size_idx + 1))
                if [[ $vm_size_idx -ge ${#FALLBACK_VM_SIZES[@]} ]]; then
                  echo "All fallback VM sizes exhausted in $location. Trying next region..."
                  region_idx=$((region_idx + 1))
                  vm_size_idx=0
                  if [[ $region_idx -ge ${#FALLBACK_REGIONS[@]} ]]; then
                    echo "All fallback regions and VM sizes exhausted."
                    exit 1
                  fi
                fi
              else
                echo "Unrecoverable error. Exiting."
                exit 1
              fi

              attempt=$((attempt + 1))
            done

            echo "Failed to create cluster after $MAX_ATTEMPTS attempts."
            exit 1
        name: createcluster
        displayName: Create Resource Group and AKS Cluster
      - task: AzureCLI@2
        inputs:
          azureSubscription: 'AgentbakerPool'
          scriptType: 'bash'
          scriptLocation: 'inlineScript'
          inlineScript: |
            # if [ "${CUSTOM_CSE}" == "False" ]; then
            echo "Add windows node pool with generated image"

            az aks nodepool add \
            --resource-group $(createcluster.CLUSTER_RG) \
            --cluster-name testcluster \
            --node-vm-size Standard_D8s_v3 \
            --node-osdisk-size 256 \
            --os-type Windows \
            --name winnp \
            --node-count 2  \
            --aks-custom-headers AKSHTTPCustomFeatures=Microsoft.ContainerService/UseCustomizedWindowsOSImage,WindowsOSImageSubscriptionID=$(AZURE_BUILD_SUBSCRIPTION_ID),WindowsOSImageResourceGroup=$(AZURE_BUILD_RESOURCE_GROUP_NAME),WindowsOSImageGallery=$(SIG_GALLERY_NAME),WindowsOSImageName=$(SIG_IMAGE_NAME),WindowsOSImageVersion=$(setvar.BUID_IMAGE_VERSION) \
            --debug
            # else
            #   echo "Add windows node pool with default windows image"
            #   az aks nodepool add \
            #   --resource-group $(setvar.CLUSTER_RG) \
            #   --cluster-name testcluster \
            #   --node-vm-size Standard_D8s_v3 \
            #   --node-osdisk-size 256 \
            #   --os-type Windows \
            #   --name winnp \
            #   --node-count 2
            # fi
        displayName: Add Windows Node Pool
      - task: AzureCLI@2
        inputs:
          azureSubscription: 'AgentbakerPool'
          scriptType: 'bash'
          scriptLocation: 'inlineScript'
          inlineScript: |
            mkdir -p $(System.DefaultWorkingDirectory)/kubeconfig

            az aks get-credentials \
            --resource-group $(createcluster.CLUSTER_RG) \
            --name testcluster \
            --file $(System.DefaultWorkingDirectory)/kubeconfig/$(createcluster.CLUSTER_RG).kubeconfig
        displayName: Get Kubeconfig
      - task: PublishPipelineArtifact@1
        inputs:
          targetPath: '$(System.DefaultWorkingDirectory)/kubeconfig'
          artifactName: '$(createcluster.CLUSTER_RG)-kubeconfig'

  - job: deploy_monagent
    timeoutInMinutes: 60
    dependsOn:
      - create
    variables:
      cluster_RG: $[ dependencies.create.outputs['createcluster.CLUSTER_RG'] ]
    pool:
      name:  $(POOL_NAME)
    steps:
    - task: DownloadPipelineArtifact@2
      inputs:
        buildType: 'current'
        artifactName: '$(cluster_RG)-kubeconfig'
        path: $(System.DefaultWorkingDirectory)/kubeconfig
      continueOnError: true
    - task: AzureCLI@2
      inputs:
        azureSubscription: 'AgentbakerPool'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          if [[ ${{ parameters.imageName }} =~ "2019" ]]; then
            hpc="hpc2019.yaml.template"
          else
            hpc="hpc2022.yaml.template"
          fi
          sed -e "s,\$managedidentityresourceid,${AZURE_MSI_RESOURCE_STRING}," \
            -e "s/\$subscription/${AZURE_BUILD_SUBSCRIPTION_ID}/" \
            -e "s/\$resourcegroup/$(cluster_RG)/" \
            -e "s/\$clustername/$(AZURE_BUILD_RESOURCE_GROUP_NAME)-aks/" \
            -e 's/\r//g' \
            $(System.DefaultWorkingDirectory)/.pipelines/tests/${hpc} > hpc.yaml

          echo "wait for monagent pods to start"
          kubectl apply -f "hpc.yaml" --kubeconfig $(System.DefaultWorkingDirectory)/kubeconfig/$(cluster_RG).kubeconfig
          #timeout 8m kubectl wait --for=condition=ready pod --all  --timeout -1s
          kubectl rollout status daemonsets/hpc --kubeconfig $(System.DefaultWorkingDirectory)/kubeconfig/$(cluster_RG).kubeconfig --timeout=10m
      displayName: Deploy MonAgent Daemonset
