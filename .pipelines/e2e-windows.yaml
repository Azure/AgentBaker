name: $(Date:yyyyMMdd)$(Rev:.r)
variables:
  TAGS_TO_RUN: "os=windows"
  SKIP_E2E_TESTS: false
  # if SIG_FOR_PRODUCTION is true, then the VHDs are deleted from the gallery before the e2e tests are run.
  SIG_FOR_PRODUCTION: False

schedules:
  - cron: "0 10 * * *"
    displayName: Daily 2am PST
    branches:
      include:
        - main
    always: true

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - e2e/**
      - '**/*.go'
pr:
  branches:
    include:
      - official/*
      - windows/*
      - main
  paths:
    include:
      - e2e/**
      - '**/*.go'

jobs:
  - template: ./templates/e2e-template.yaml
    parameters:
      name: Windows Tests
      IgnoreScenariosWithMissingVhd: false
