name: Lint Shell/Bash Scripts
on: pull_request

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-go@v6
      with:
        go-version: '1.25'
    - run: |
        make validate-shell
      name: Lint shell/bash scripts with ShellCheck
