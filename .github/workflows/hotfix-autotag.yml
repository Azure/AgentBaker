name: Hotfix Auto-Tag

# Automatically creates a hotfix tag when a PR is merged to an official/* branch.
# Example: if branch is official/v20260219 and latest tag is v0.20260219.0,
# creates v0.20260219.1.
on:
  pull_request:
    branches:
      - 'official/**'
    types: [closed]

permissions:
  contents: write

jobs:
  auto-tag:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Parse version and create tag
        run: |
          # Extract date from base branch name: official/v20260219 → 20260219
          BRANCH="${{ github.event.pull_request.base.ref }}"
          DATE=$(echo "${BRANCH}" | sed -n 's|official/v\([0-9]*\)|\1|p')

          if [[ -z "${DATE}" ]]; then
            echo "ERROR: Could not parse date from branch ${BRANCH}"
            exit 1
          fi

          echo "Branch: ${BRANCH}"
          echo "Date: ${DATE}"

          # Ensure we have the latest tags from the remote
          git fetch --tags --force origin

          # Find latest tag matching v0.${DATE}.*
          LATEST_TAG=$(git tag -l "v0.${DATE}.*" --sort=-v:refname | head -1)

          if [[ -z "${LATEST_TAG}" ]]; then
            # No existing tag — start at patch .1 (assuming .0 was the original release)
            PATCH=1
          else
            # Increment PATCH: v0.20260219.0 → v0.20260219.1
            PATCH=$(echo "${LATEST_TAG}" | grep -oP '\.\K[0-9]+$')
            PATCH=$((PATCH + 1))
          fi

          NEW_TAG="v0.${DATE}.${PATCH}"

          echo "Latest tag: ${LATEST_TAG:-none}"
          echo "Initial new tag candidate: ${NEW_TAG}"

          # Refresh tags to capture any new tags created by concurrent runs
          git fetch --tags --force origin

          # If the candidate tag already exists (e.g., due to a concurrent run),
          # keep incrementing PATCH until we find an unused tag.
          while git rev-parse -q --verify "refs/tags/${NEW_TAG}" >/dev/null 2>&1; do
            echo "Tag ${NEW_TAG} already exists, incrementing patch..."
            PATCH=$((PATCH + 1))
            NEW_TAG="v0.${DATE}.${PATCH}"
          done

          echo "New tag: ${NEW_TAG}"

          git tag "${NEW_TAG}"
          git push origin "${NEW_TAG}"

          echo "✅ Created and pushed tag ${NEW_TAG}"
