name: Shell/Bash Script Unit Tests
on: pull_request

jobs:
  shellspec:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v5
      with:
        go-version: '1.22'
    - run: |
        make shellspec
      name: Run shell/bash script unit tests with shellspec
